js_import ddc from conf.d/ddc.nginx.js;

# from main server we see its own php/db/sign server (shard zero)
# some urls can be 'shortcircuit' here as the can not contains shard key (tid) by design

map $http_esia_host $signer_function {
    esia.gosuslugi.ru  http://sign:9940/sign;
    esia-portal1.test.gosuslugi.ru  http://localhost/app/anonymous/sign_esia_test;
}

map "$http_internal_key$cookie_enable_maintenance" $skip_maintenance {
    default "yes";
    "" "";
}

js_shared_dict_zone zone=test:1M timeout=60s evict;
js_shared_dict_zone zone=user:30M timeout=60s evict;

server {
    listen       8088 default_server;
    listen  [::]:8088 default_server;
    listen unix:/var/www/sockets/web.socket;
    server_name  localhost web;

    client_max_body_size 100M;
    subrequest_output_buffer_size 64K;

    root   /var/www/html;
    add_header X-Local-Time $time_iso8601 always;

    include  conf.d/maintenance-default[.]inc;

    # all script files have no(!) extension in their uri

    include conf.d/health.inc;

    # static files, served from current server (ext|int)
    # upper router should block access to /app/int and /static/int
    # when incoming request is external
    # so that internal users are in internal network always
    # also, check referer!
    # таким образом, мы должны иметь 
    # во внешней все без  static/int, app/int
    # во внутренней ВСЕ (?)
    # route во внутр из внутр сети
    # + /app/int, /static/int - во внутр
    # + /app/ext, /static/int - во внешний

    location = / {
       expires epoch;
       try_files /index.html =404;
    }

    location = /favicon.ico { }
    location = /manifest.json { }
    location /manifest/ { }
    location /static {
        expires max;    
        add_header static always;
        add_header X-Local-Time $time_iso8601 always;
    }

    location = /int {
       expires epoch;
       try_files /index.html =404;
    }

    # router here

    location / {
        # spa (unknown urls) is redireced here, so toplevel is good enough to deal with 
        types { }
        default_type text/plain;
        add_header Content-Type text/plain ;
        add_header app-area spa always;
        add_header X-Local-Time $time_iso8601 always;
        absolute_redirect off;
        return 302 /?$request_uri ;
    }
    location /int {
        # spa (unknown urls) is redireced here, so toplevel is good enough to deal with 
        types { }
        default_type text/plain;
        add_header Content-Type text/plain ;
        add_header app-area spa-int always;
        add_header X-Local-Time $time_iso8601 always;
        absolute_redirect off;
        return 302 /int?$request_uri ;
    }

    location /ping {
        return 200 pong;
    }

    location /app {
        # serve nothing from app
        # ext|int processed in own locations
        return 404;
    }

    location = /app/login {
        add_header app-area stuff-ext-login always;        
        add_header X-Local-Time $time_iso8601 always;
        expires epoch;
        proxy_pass_request_body on;
        js_content ddc.cached_login;

        #proxy_set_header CALLBACK_ADDR web;
        #proxy_pass http://ext_app:9580/app/ext/anonymous/login;    
    }
    location = /app/login_redirect {
        internal;
        proxy_pass http://ext_app:9580/app/ext/anonymous/login;    
    }

    location ~ ^/app/(ext|int|par)/(.*)[/]([^/]+)[.]pdf$ {
        root /var/www;
        add_header app-area files;        
        add_header X-Local-Time $time_iso8601 always;
    }

    location ~ ^/app/(ext|int|par)/(.*) {
        add_header app-area stuff-$1 always;        
        add_header X-Local-Time $time_iso8601 always;
        expires epoch;
        proxy_set_header CALLBACK_ADDR web;
        proxy_pass http://$1_app:9580;
    }

    # /app/cache/monitor/<peer> - check posted versions (json)
    # if ok - redirect to proxy to http://ssebackend
    # /app/cache/local?zone=<channel-group>&key=<channel-id> - get local version
    # /app/cache/upstream?zone=<channel-group>&key=<channel-id> -get upstream version
    location /app/cache/monitor {
        # this is external location!
        # everybody can read 

        postpone_output 0;
        js_content ddc.cache_test;
    }
    location /app/cache/purge {
        # this is internal location !
        # we can mark it
        # also, notification do not used index_and_bundlethis entrypoint
        # see below

        js_content ddc.cache_purge_local;
    }
    location /app/cache/upstream {
        internal;

        default_type application/json;
        location /app/cache/upstream/test {
            js_content ddc.cache_upstream_version_dummy;
        }
        location /app/cache/upstream/user {
            # include   conf.d/fastcgi_php;
            # fastcgi_param  SCRIPT_FILENAME  $document_root/app/common/uinfo.php;
            # fastcgi_param  REQUEST_METHOD GET;
            # fastcgi_pass_request_body off;
            
            # today we get uinfo form ext server (ext and int uinfo is the same)
            # but if ext system is absent, use int (internally)
            # app server know enough!  
        }
    }

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # external redirects

    location /external/egrul/ {
        proxy_pass_request_headers off;
        proxy_set_header X-Requested-With XMLHttpRequest;
        proxy_set_header Content-Type application/x-www-form-urlencoded;
        set $tg https://egrul.nalog.ru/ ;
        location ~ /external/egrul/(.+) {
            set $tg https://egrul.nalog.ru/ ;
            proxy_pass $tg$1?$args ;
            add_header pp $tg$1?$args always;
            add_header X-Accel-Buffering 'no';
            add_header X-Local-Time $time_iso8601 always;
        }
        add_header X-Accel-Buffering 'no';
        add_header X-Local-Time $time_iso8601 always;
        proxy_pass $tg ;
    }

    location /external/esia/ {
        # proxy_pass https://esia.gosuslugi.ru/;
        proxy_pass https://109.207.2.205/;
        add_header X-Accel-Buffering 'no';
        add_header X-Local-Time $time_iso8601 always;
    }

}

server {
    listen unix:/var/www/sockets/local-web.socket;
    listen 9980;

    root   /var/www/html;

    location = /tick {
        access_log off;
        return 200 OK;
    }
    location = /minute/ext {
        access_log off;
        return 200 OK;
    }
    location = /minute/int {
        access_log off;
        return 200 OK;
    }
    location = /minute/par {
        access_log off;
        return 200 OK;
    }

    #location @second {
    #    js_periodic ddc.tick interval=1s;
    #}

    location @minute {
        js_periodic ddc.tick interval=1m;
    }

    location /notify/pg/main/user {
        js_content ddc.purge_by_url;
        # return 200 OK;
    }
}
